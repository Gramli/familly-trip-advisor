name: Backend Build

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-build.yml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-build.yml'

jobs:
  build:
    name: Build & Test .NET Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore backend/familly-trip-advisor.csproj

      - name: Build
        run: dotnet build backend/familly-trip-advisor.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Tests/familly-trip-advisor.UnitTests/familly-trip-advisor.UnitTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/Tests/familly-trip-advisor.UnitTests/TestResults/test-results.trx
